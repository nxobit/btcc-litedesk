<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆角方形 -->
  <rect x="20" y="20" width="472" height="472" rx="80" ry="80" fill="#D4A017" stroke="#B38B0E" stroke-width="40"/>

  <!-- 主币圆形 -->
  <circle cx="256" cy="256" r="190" fill="#E8B923" stroke="#C99A0F" stroke-width="25"/>
  <circle cx="256" cy="256" r="165" fill="#D4A017" stroke="#B38B0E" stroke-width="8"/>

  <!-- BTCC 标志 -->
  <!-- B 的竖线 -->
  <rect x="175" y="140" width="45" height="170" rx="8" fill="#2C2C2C"/>
  <!-- B 上横 -->
  <rect x="175" y="145" width="85" height="35" rx="8" fill="#2C2C2C"/>
  <!-- B 中横 -->
  <rect x="175" y="210" width="72" height="32" rx="8" fill="#2C2C2C"/>
  <!-- B 下半部（C 形） -->
  <path d="M 215 255 Q 280 255 285 290 Q 285 325 250 335 Q 215 335 215 300" fill="none" stroke="#2C2C2C" stroke-width="38" stroke-linejoin="round"/>

  <!-- BTCC 文字 -->
  <text x="256" y="395" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="#2C2C2C" text-anchor="middle" dominant-baseline="middle">BTCC</text>

  <!-- 左侧电路装饰 -->
  <circle cx="105" cy="210" r="8" fill="#2C2C2C"/>
  <circle cx="105" cy="230" r="8" fill="#2C2C2C"/>
  <line x1="120" y1="210" x2="145" y2="210" stroke="#2C2C2C" stroke-width="6"/>
  <line x1="120" y1="230" x2="145" y2="230" stroke="#2C2C2C" stroke-width="6"/>

  <!-- 右侧电路装饰 -->
  <circle cx="407" cy="210" r="8" fill="#2C2C2C"/>
  <circle cx="407" cy="230" r="8" fill="#2C2C2C"/>
  <line x1="367" y1="210" x2="392" y2="210" stroke="#2C2C2C" stroke-width="6"/>
  <line x1="367" y1="230" x2="392" y2="230" stroke="#2C2C2C" stroke-width="6"/>
</svg>
